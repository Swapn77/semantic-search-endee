<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semantic Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: #7c6af7;
    }

    .header p {
      margin-top: 10px;
      color: #888;
      font-size: 1rem;
    }

    .search-box {
      display: flex;
      width: 100%;
      max-width: 650px;
      background: #1a1a2e;
      border: 1px solid #2e2e4e;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(124, 106, 247, 0.1);
      transition: box-shadow 0.3s;
    }

    .search-box:focus-within {
      box-shadow: 0 0 30px rgba(124, 106, 247, 0.35);
      border-color: #7c6af7;
    }

    .search-box input {
      flex: 1;
      padding: 18px 22px;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 1rem;
    }

    .search-box input::placeholder { color: #555; }

    .search-box button {
      padding: 18px 28px;
      background: #7c6af7;
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-box button:hover { background: #6a59e0; }

    .tags {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tag {
      background: #1a1a2e;
      border: 1px solid #2e2e4e;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      border-color: #7c6af7;
      color: #7c6af7;
    }

    .results {
      margin-top: 50px;
      width: 100%;
      max-width: 650px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-card {
      background: #1a1a2e;
      border: 1px solid #2e2e4e;
      border-radius: 12px;
      padding: 22px 24px;
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(10px); }
    }

    .result-card:nth-child(1) { animation-delay: 0.05s; }
    .result-card:nth-child(2) { animation-delay: 0.15s; }
    .result-card:nth-child(3) { animation-delay: 0.25s; }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .rank {
      font-size: 0.75rem;
      color: #7c6af7;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-bar-wrap {
      width: 120px;
      background: #0f0f1a;
      border-radius: 10px;
      height: 6px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c6af7, #a78bfa);
      border-radius: 10px;
      transition: width 0.6s ease;
    }

    .result-text {
      font-size: 0.97rem;
      color: #ddd;
      line-height: 1.6;
    }

    .score-label {
      font-size: 0.75rem;
      color: #666;
      margin-top: 10px;
    }

    .loading {
      color: #666;
      font-size: 0.9rem;
      margin-top: 40px;
      display: none;
    }

    .powered {
      margin-top: 60px;
      font-size: 0.75rem;
      color: #444;
    }

    .powered span { color: #7c6af7; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Semantic <span>Search</span></h1>
    <p>Search by meaning, not just keywords — powered by Endee vector database</p>
  </div>

  <div class="search-box">
    <input type="text" id="queryInput" placeholder="e.g. how to stay healthy..." />
    <button onclick="doSearch()">Search</button>
  </div>

  <div class="tags">
    <div class="tag" onclick="quickSearch('how to stay healthy')">how to stay healthy</div>
    <div class="tag" onclick="quickSearch('what is machine learning')">what is machine learning</div>
    <div class="tag" onclick="quickSearch('famous places in Europe')">famous places in Europe</div>
    <div class="tag" onclick="quickSearch('climate and environment')">climate and environment</div>
  </div>

  <div class="loading" id="loading">Searching...</div>
  <div class="results" id="results"></div>

  <div class="powered">powered by <span>Endee</span> vector database</div>

  <script>
    document.getElementById("queryInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") doSearch();
    });

    function quickSearch(text) {
      document.getElementById("queryInput").value = text;
      doSearch();
    }

    async function doSearch() {
      const query = document.getElementById("queryInput").value.trim();
      if (!query) return;

      document.getElementById("loading").style.display = "block";
      document.getElementById("results").innerHTML = "";

      const res = await fetch("/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });

      const data = await res.json();
      document.getElementById("loading").style.display = "none";

      data.forEach((item, i) => {
        const card = document.createElement("div");
        card.className = "result-card";
        const pct = Math.round(item.score * 100);
        card.innerHTML = `
          <div class="result-top">
            <span class="rank">Result ${i + 1}</span>
            <div class="score-bar-wrap">
              <div class="score-bar" style="width: ${pct}%"></div>
            </div>
          </div>
          <div class="result-text">${item.text}</div>
          <div class="score-label">similarity score: ${item.score.toFixed(3)}</div>
        `;
        document.getElementById("results").appendChild(card);
      });
    }
  </script>

</body>
</html>
